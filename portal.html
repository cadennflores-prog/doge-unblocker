<!DOCTYPE html>
<html>
<head>
    <title>Math Simulation Node</title>
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    
    <script>
        // 2. WAKE UP THE PROXY (This runs as soon as the page loads)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('uv/sw.js', {
                    scope: __uv$config.prefix
                }).then(() => {
                    console.log("Engine: READY");
                }).catch((err) => {
                    console.log("Engine: ERROR", err);
                });
            });
        }

        // 3. THE AUTO-TYPE FUNCTION
        function launchSimulation() {
            const gameUrl = "https://now.gg/apps/roblox-corporation/1316/roblox.html";
            
            if (window.__uv$config) {
                // This encodes the URL so the school filter can't see it
                location.href = __uv$config.prefix + __uv$config.encodeUrl(gameUrl);
            } else {
                alert("System initializing... wait 2 seconds and try again.");
            }
        }
    </script>

    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #333; padding: 40px; border-radius: 15px; background: #1a1a1a; text-align: center; }
        .btn { background: #5865F2; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #4752c4; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Secure Research Terminal</h2>
        <p>Simulation: Roblox Node 1316</p>
        <button class="btn" onclick="launchSimulation()">INITIALIZE</button>
    </div>
</body>
</html>
